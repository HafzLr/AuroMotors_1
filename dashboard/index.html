<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Auro Motors</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-wrap">
  <aside class="sidebar">
    <div class="logo">AURO ADMIN</div>
    <ul class="sidebar-menu">
      <li><a href="index.html" class="active"><span class="icon">📊</span>Dashboard</a></li>
      <li><a href="mobil.html"><span class="icon">🚗</span>Mobil</a></li>
      <li><a href="pelanggan.html"><span class="icon">👥</span>Pelanggan</a></li>
      <li><a href="transaksi.html"><span class="icon">💼</span>Transaksi</a></li>
      <li><a href="pembayaran.html"><span class="icon">💳</span>Pembayaran</a></li>
      <li><a href="stok.html"><span class="icon">📦</span>Stok</a></li>
      <li><a href="sales.html"><span class="icon">🏆</span>Sales</a></li>
      <li><a href="supplier.html"><span class="icon">🏭</span>Supplier</a></li>
    </ul>
    <div class="sidebar-logout">
      <a href="#" onclick="logout();return false;"><span class="icon">🚪</span>Keluar</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="dash-header">
      <h1>Dashboard Ringkasan</h1>
      <div style="color:var(--text-muted);font-size:0.9rem" id="welcome"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Mobil</div><div class="stat-value" id="s-mobil">0</div></div>
      <div class="stat-card"><div class="stat-label">Transaksi Bulan Ini</div><div class="stat-value" id="s-trx">0</div></div>
      <div class="stat-card"><div class="stat-label">Total Pendapatan</div><div class="stat-value" id="s-pendapatan">Rp 0</div></div>
      <div class="stat-card"><div class="stat-label">Stok Tersedia</div><div class="stat-value" id="s-stok">0</div></div>
    </div>

    <div class="chart-wrap">
      <h3>Penjualan per Bulan</h3>
      <canvas id="chart-sales" height="80"></canvas>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h3>Transaksi Terbaru</h3></div>
      <table class="data-table" id="t-trx">
        <thead><tr><th>ID</th><th>Tanggal</th><th>Pelanggan</th><th>Sales</th><th>Total</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('showroom_user') || '{}');
document.getElementById('welcome').textContent = `Selamat datang, ${user.nama || user.username || 'Admin'}`;

(async () => {
  const mobil = await getMobil();
  document.getElementById('s-mobil').textContent = mobil.length;
  document.getElementById('s-stok').textContent = mobil.reduce((a, m) => a + (m.stok || 0), 0);

  // Data transaksi dummy fallback
  const trx = [
    { id_transaksi: 'TRX001', tanggal: '2025-05-02', pelanggan: 'Andi Wijaya', sales: 'Siti Aminah', total_harga: 450000000 },
    { id_transaksi: 'TRX002', tanggal: '2025-05-01', pelanggan: 'Rina Kusuma', sales: 'Siti Aminah', total_harga: 240000000 },
    { id_transaksi: 'TRX003', tanggal: '2025-04-28', pelanggan: 'Budi Santoso', sales: 'Siti Aminah', total_harga: 1100000000 }
  ];
  document.getElementById('s-trx').textContent = trx.length;
  document.getElementById('s-pendapatan').textContent = formatRupiah(trx.reduce((a,t)=>a+t.total_harga,0));

  renderTable('t-trx', trx, [
    { key: 'id_transaksi' },
    { key: 'tanggal' },
    { key: 'pelanggan' },
    { key: 'sales' },
    { render: r => formatRupiah(r.total_harga) }
  ]);

  // Chart.js
  new Chart(document.getElementById('chart-sales'), {
    type: 'line',
    data: {
      labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
      datasets: [{
        label: 'Penjualan (Rp)',
        data: [3,5,4,7,9,6,8,10,7,11,9,12].map(x => x * 100000000),
        borderColor: '#FFD700',
        backgroundColor: 'rgba(255,215,0,0.15)',
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      plugins: { legend: { labels: { color: '#F5F5F5' } } },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: 'rgba(184,134,11,0.15)' } },
        y: { ticks: { color: '#888', callback: v => 'Rp ' + (v/1000000) + 'jt' }, grid: { color: 'rgba(184,134,11,0.15)' } }
      }
    }
  });
})();
</script>
</body>
</html>
