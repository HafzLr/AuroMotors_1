<!-- MODAL FORM -->
<div class="modal-overlay" id="modal-form">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Tambah Data</h3>
      <button class="modal-close" onclick="closeModal('modal-form')">&times;</button>
    </div>
    <form id="form-data">
      <div class="modal-body">
        <div class="form-group"><label>ID Supplier</label><input type="number" name="id_supplier"></div><div class="form-group"><label>Nama Supplier</label><input type="text" name="nama_supplier"></div><div class="form-group"><label>Jalan</label><input type="text" name="jalan"></div><div class="form-group"><label>Kota</label><input type="text" name="kota"></div><div class="form-group"><label>Kode Pos</label><input type="text" name="kode_pos"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal('modal-form')">Batal</button>
        <button type="submit" class="btn btn-primary btn-sm">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>

const dummy_pelanggan = [
  { id_pelanggan: 1, nama: 'Andi Wijaya', no_hp: '08123456789', jalan: 'Jl. Anggrek No.20', kota: 'Jakarta', kode_pos: '10130' },
  { id_pelanggan: 2, nama: 'Rina Kusuma', no_hp: '08198765432', jalan: 'Jl. Kenanga No.15', kota: 'Bandung', kode_pos: '40120' },
  { id_pelanggan: 3, nama: 'Hendra Pratama', no_hp: '08111222333', jalan: 'Jl. Sudirman No.5', kota: 'Surabaya', kode_pos: '60110' }
];
const dummy_trx = [
  { id_transaksi: 1001, tanggal: '2025-05-02', pelanggan: 'Andi Wijaya', sales: 'Siti Aminah', total_harga: 450000000 },
  { id_transaksi: 1002, tanggal: '2025-05-01', pelanggan: 'Rina Kusuma', sales: 'Siti Aminah', total_harga: 240000000 },
  { id_transaksi: 1003, tanggal: '2025-04-28', pelanggan: 'Hendra Pratama', sales: 'Siti Aminah', total_harga: 1100000000 }
];
const dummy_bayar = [
  { id_pembayaran: 5001, tgl_bayar: '2025-05-02', jumlah_pembayaran: 450000000, metode: 'Transfer', id_transaksi: 1001, id_mobil: 1 },
  { id_pembayaran: 5002, tgl_bayar: '2025-05-01', jumlah_pembayaran: 240000000, metode: 'Cash', id_transaksi: 1002, id_mobil: 5 }
];
const dummy_stok = [
  { id_stok: 1, jumlah: 10, tanggal_masuk: '2024-01-15', supplier: 'PT Auto Prima' },
  { id_stok: 2, jumlah: 5, tanggal_masuk: '2024-02-20', supplier: 'CV Mobil Jaya' }
];
const dummy_sales = [
  { id_pegawai: 2, nama: 'Siti Aminah', target_penjualan: 500000000, komisi: 25000000, pencapaian: 78, jml_trx: 12 },
  { id_pegawai: 3, nama: 'Joko Susanto', target_penjualan: 400000000, komisi: 20000000, pencapaian: 45, jml_trx: 8 }
];
const dummy_supplier = [
  { id_supplier: 1, nama_supplier: 'PT Auto Prima', jalan: 'Jl. Sudirman No.1', kota: 'Jakarta', kode_pos: '10110' },
  { id_supplier: 2, nama_supplier: 'CV Mobil Jaya', jalan: 'Jl. Diponegoro No.5', kota: 'Bandung', kode_pos: '40115' }
];
async function getMobil_local() { return await getMobil(); }


let data = [];
let editIndex = -1;

(async () => {
  data = dummy_supplier;
  refresh();
})();

function refresh() {
  renderTable('data-table', data, [
      { key: 'id_supplier' },
      { key: 'nama_supplier' },
      { key: 'jalan' },
      { key: 'kota' },
      { key: 'kode_pos' }
    ],
    (row) => `
      <button class="btn btn-outline btn-sm" onclick="editRow(${data.indexOf(row)})">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="delRow(${data.indexOf(row)})">Hapus</button>
    `
  );
}

function openForm() {
  editIndex = -1;
  document.getElementById('modal-title').textContent = 'Tambah Data';
  document.getElementById('form-data').reset();
  openModal('modal-form');
}

function editRow(i) {
  editIndex = i;
  document.getElementById('modal-title').textContent = 'Edit Data';
  const form = document.getElementById('form-data');
  Object.entries(data[i]).forEach(([k, v]) => {
    if (form[k]) form[k].value = v;
  });
  openModal('modal-form');
}

function delRow(i) {
  if (!confirm('Yakin hapus data ini?')) return;
  data.splice(i, 1);
  refresh();
}

document.getElementById('form-data').addEventListener('submit', e => {
  e.preventDefault();
  const formData = Object.fromEntries(new FormData(e.target));
  if (editIndex >= 0) {
    data[editIndex] = { ...data[editIndex], ...formData };
  } else {
    data.push(formData);
  }
  closeModal('modal-form');
  refresh();
});
</script>
</body>
</html>
