<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Auro Motors</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <h2>Login Admin</h2>
    <p class="sub">Masuk ke dashboard manajemen showroom</p>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Masuk</button>
      <p id="error-msg" style="color:#e74c3c;text-align:center;margin-top:1rem;display:none"></p>
      <p style="text-align:center;margin-top:1.5rem"><a href="index.html" style="font-size:0.9rem">← Kembali ke Beranda</a></p>
      <p style="text-align:center;color:var(--text-muted);font-size:0.8rem;margin-top:1rem">Demo: admin / admin123</p>
    </form>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error-msg');
  errorEl.style.display = 'none';

  // Coba ke API
  const res = await apiPost('auth.php', { action: 'login', username, password });

  if (res.token) {
    localStorage.setItem('showroom_token', res.token);
    localStorage.setItem('showroom_user', JSON.stringify(res.user || { username }));
    window.location.href = 'dashboard/index.html';
  } else if (username === 'admin' && password === 'admin123') {
    // Fallback demo (jika API belum jalan)
    localStorage.setItem('showroom_token', 'demo-token-' + Date.now());
    localStorage.setItem('showroom_user', JSON.stringify({ username: 'admin', nama: 'Administrator' }));
    window.location.href = 'dashboard/index.html';
  } else {
    errorEl.textContent = res.error || 'Username atau password salah';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
